           <label>Servings</label>
           <input type="number" id="intake-servings" value="${esc(initS)}"
             step="0.25" min="0" placeholder="0" inputmode="decimal" autofocus
             oninput="syncIntakeFromServings()"/>
         </div>
         <div class="field">
           <label>${esc(unit === "ml" ? "Millilitres" : "Grams")}</label>
           <input type="number" id="intake-grams" value="${esc(initG)}"
             step="1" min="0" placeholder="0" inputmode="numeric"
             oninput="syncIntakeFromGrams()"/>
         </div>
       </div>
       <div class="field-hint">1 serving = ${esc(servingG)}${esc(unit)}${food.servingLabel ? ` &middot; ${esc(food.servingLabel)}` : ""}</div>`
    : `<div class="field">
         <label>How many ${esc(unit)} did you eat?</label>
         <input type="number" id="intake-grams" value="${esc(initG)}"
           placeholder="0" inputmode="numeric" min="0" max="3000" step="1" autofocus/>
       </div>`;

  showModal(`
    <div data-serving-g="${esc(servingG)}" id="intake-modal-data"></div>
    <h2>${esc(food.name)}</h2>
    ${food.brand ? `<p style="color:var(--accent2);font-style:italic;margin-bottom:14px">${esc(food.brand)}</p>` : ""}
    <p>${food.cal} kcal &middot; ${food.p}g pro &middot; ${food.c}g carb &middot; ${food.f}g fat${naLine} <em>per 100${esc(unit)}</em></p>
    ${inputBlock}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTodayIntake(${idLit})">${hasExisting ? "Update" : "Add"}</button>
    </div>`);
}

function getModalServingG() {
  const el = document.getElementById("intake-modal-data");
  if (!el) return 0;
  const v = parseFloat(el.dataset.servingG);
  return isFinite(v) && v > 0 ? v : 0;
}
function syncIntakeFromServings() {
  const servingG = getModalServingG();
  if (!servingG) return;
  const sEl = document.getElementById("intake-servings");
  const gEl = document.getElementById("intake-grams");
  if (!sEl || !gEl) return;
  if (sEl.value === "") { gEl.value = ""; return; }
  const s = parseFloat(sEl.value);
  if (isFinite(s)) gEl.value = Math.round(s * servingG);
}
function syncIntakeFromGrams() {
  const servingG = getModalServingG();
  if (!servingG) return;
  const sEl = document.getElementById("intake-servings");
  const gEl = document.getElementById("intake-grams");
  if (!sEl || !gEl) return;
  if (gEl.value === "") { sEl.value = ""; return; }
  const g = parseFloat(gEl.value);
  if (isFinite(g)) sEl.value = (Math.round((g / servingG) * 100) / 100).toString();
}

function saveTodayIntake(id) {
  const input = document.getElementById("intake-grams");
  if (!input) return;
  const grams = parseInt(input.value);
  if (!isFinite(grams) || grams < 0) { showToast("Enter a number", true); return; }
  const day = ensureTodayLog();
  if (!day.intake) day.intake = {};
  if (grams === 0) {
    delete day.intake[String(id)];
  } else {
    day.intake[String(id)] = grams;
  }
  if (Object.keys(day.intake).length === 0) delete day.intake;
  saveState(true);
  closeModal();
  // Jump to the Today tab so the user sees the result of their action.
  switchTab("today");
  showToast(grams === 0 ? "Removed" : "Logged");
}

function removeTodayIntake(id) {
  const day = STATE.log[todayKey()];
  if (!day || !day.intake) return;
  delete day.intake[String(id)];
  if (Object.keys(day.intake).length === 0) delete day.intake;
  saveState(true); render(); showToast("Removed from today");
}

// ── Actions: profile (Settings tab) ──────────────────────────────────────────
function updateProfile(key, value) {
  const numericKeys = ["weightLbs","heightIn","age","proteinPerLb","sodiumMg"];
  if (numericKeys.includes(key)) {
    const n = parseFloat(value);
    STATE.profile[key] = isFinite(n) ? n : STATE.profile[key];
  } else {
    STATE.profile[key] = value;
  }
  recomputeTargets();
  saveState();
}

function updateProfileFatPct(pct) {
  const n = parseFloat(pct);
  if (isFinite(n)) STATE.profile.fatPct = Math.max(0.05, Math.min(0.6, n / 100));
  recomputeTargets();
  saveState();
}

function confirmReset() {
  showModal(`
    <h2>Reset all data?</h2>
    <p>This will clear your check-in history, weight log, custom foods, dismissed foods, profile, and portion sizes. Export a backup first if you want to keep your data.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="hardReset()">Reset all</button>
    </div>`);
}

function hardReset() {
  // Clear both current and legacy storage keys so a stale legacy entry
  // doesn't get re-migrated on next load.
  LEGACY_KEYS.forEach(k => { try { localStorage.removeItem(k); } catch (e) {} });
  STATE = freshState();
  recomputeTargets();
  saveState(true); render(); showToast("All data reset");
}

// ── Global error guard ───────────────────────────────────────────────────────
window.addEventListener("error", function(e) {
  if (!e.message || e.message === "Script error.") return;
  // Log everything we have — line/column/stack — so debugging on a deployed
  // build isn't a guessing game.
  console.error("App error:", e.message, "at", e.filename + ":" + e.lineno + ":" + e.colno, e.error && e.error.stack);
  showToast("Error: " + e.message.slice(0, 60), true);
});
// Log but don't swallow rejections — let them surface in the console.
window.addEventListener("unhandledrejection", function(e) {
  console.warn("Unhandled promise rejection:", e.reason);
});

// ── Actions: cloud sync (Settings tab) ───────────────────────────────────────
function generateSyncToken() {
  if (!window.crypto || !window.crypto.getRandomValues) {
    showToast("Crypto unavailable", true);
    return;
  }
  const bytes = new Uint8Array(16);
  window.crypto.getRandomValues(bytes);
  SYNC.token = Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
  SYNC.lastError = null;
  saveSync();
  showToast("Token generated");
  // Push our current state to the cloud so this new token has data.
  cloudPush(STATE);
  render();
}

function setSyncToken(raw) {
  const t = (raw || "").trim();
  if (!t) {
    SYNC.token = "";
    SYNC.lastError = null;
    saveSync(); render();
    return;
  }
  if (!/^[A-Za-z0-9_-]{16,64}$/.test(t)) {
    showToast("Invalid token format", true);
    return;
  }
  SYNC.token = t;
  SYNC.lastError = null;
  saveSync();
  // Try pulling whatever this token has in the cloud.
  initialCloudPull();
  render();
  showToast("Token saved — syncing");
}

function copySyncToken() {
  if (!SYNC.token) return;
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = SYNC.token;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); showToast("Token copied"); }
    catch (e) { showToast("Copy failed", true); }
    ta.remove();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(SYNC.token)
      .then(() => showToast("Token copied"))
      .catch(() => fallback());
  } else {
    fallback();
  }
}

function clearSyncToken() {
  showModal(`
    <h2>Disable cloud sync?</h2>
    <p>This removes the token from this device only — your data stays in the cloud and on this device. You can re-enable later by pasting the same token.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmClearSync()">Disable</button>
    </div>`);
}
function confirmClearSync() {
  SYNC.token = "";
  SYNC.lastError = null;
  saveSync(); closeModal(); render();
  showToast("Sync disabled");
}

function manualSync() {
  if (!SYNC.token) { showToast("Set a token first", true); return; }
  showToast("Syncing…");
  (async () => {
    // Push first so any unsaved local edits land before we compare.
    await cloudPush(STATE);
    const cloudState = await cloudPull();
    if (cloudState) {
      const localT = STATE.savedAt ? Date.parse(STATE.savedAt) : 0;
      const cloudT = cloudState.savedAt ? Date.parse(cloudState.savedAt) : 0;
      if (cloudT > localT + 1000) {
        STATE = migrate(cloudState);
        recomputeTargets();
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch (e) {}
        render();
        showToast("Pulled newer cloud copy");
        return;
      }
    }
    render();
    if (!SYNC.lastError) showToast("Synced");
    else                 showToast("Sync error — see Settings", true);
  })();
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
// Fire the initial cloud pull after the first render so the user sees the
// local state instantly; cloud-newer data swaps in a moment later.
initialCloudPull();
// Resilience: ask the browser not to evict us, try IDB recovery if local is
// empty, and write today's snapshot + IDB mirror immediately so we have a
// fresh backup even if the user never edits anything this session.
requestPersistentStorage();
idbRecoverIfNeeded();
writeDailySnapshot();
idbWrite(STATE);
// Last-ditch flush on tab close so any pending debounced save reaches storage.
window.addEventListener("pagehide", () => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch (e) {}
  try { writeDailySnapshot(); } catch (e) {}
});
</script>
</body>
</html>
